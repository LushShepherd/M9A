name: Sync from Upstream

on:
  schedule:
    - cron: "30 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.repository == 'LushShepherd/M9A'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Merge upstream main
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/MAA1999/M9A.git
          git fetch upstream main

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Origin main already contains upstream/main."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git merge --no-edit upstream/main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push synced main
        if: steps.merge.outputs.changed == 'true'
        run: git push origin HEAD:main
